# ---- UK-relevant drone signatures ----------------------------------
# Appended to /etc/kismet/kismet_site.conf 2026-05-09
# Order matters — Kismet picks the first matching uav_match rule.
# Specific (Matrice/enterprise) before generic DJI catch-all.

# DJI Matrice series — primary UK police / fire / SAR drones
uav_match=dji_m30:name="DJI",model="Matrice 30 / 30T (police/enterprise)",ssid="^M30T?[-_].*",mac=60:60:1F:00:00:00/FF:FF:FF:00:00:00
uav_match=dji_m30_alt:name="DJI",model="Matrice 30 / 30T",ssid="^DJI[-_]M30T?[-_].*",mac=60:60:1F:00:00:00/FF:FF:FF:00:00:00
uav_match=dji_m300:name="DJI",model="Matrice 300 RTK (police/enterprise)",ssid="^M300[-_].*",mac=60:60:1F:00:00:00/FF:FF:FF:00:00:00
uav_match=dji_m300_alt:name="DJI",model="Matrice 300 RTK",ssid="^DJI[-_]M300.*",mac=60:60:1F:00:00:00/FF:FF:FF:00:00:00
uav_match=dji_m350:name="DJI",model="Matrice 350 RTK (police/enterprise)",ssid="^M350[-_].*",mac=60:60:1F:00:00:00/FF:FF:FF:00:00:00
uav_match=dji_m350_alt:name="DJI",model="Matrice 350 RTK",ssid="^DJI[-_]M350.*",mac=60:60:1F:00:00:00/FF:FF:FF:00:00:00
uav_match=dji_m200:name="DJI",model="Matrice 200/210 (older enterprise)",ssid="^M2[01]0[-_].*",mac=60:60:1F:00:00:00/FF:FF:FF:00:00:00

# DJI enterprise Mavic variants (police/inspection/thermal)
uav_match=dji_mavic3ent:name="DJI",model="Mavic 3 Enterprise (police/enterprise)",ssid="^DJI[-_]Mavic[-_]?3[-_]?Ent.*"
uav_match=dji_mavic3thermal:name="DJI",model="Mavic 3 Thermal (police/fire/SAR)",ssid="^DJI[-_]Mavic[-_]?3[-_]?T(hermal)?[-_].*"
uav_match=dji_mavic3multi:name="DJI",model="Mavic 3 Multispectral",ssid="^DJI[-_]Mavic[-_]?3[-_]?M[-_].*"

# Modern DJI consumer (likely-hobby)
uav_match=dji_mavic3:name="DJI",model="Mavic 3 (consumer)",ssid="^DJI[-_]Mavic[-_]?3([-_].*)?$"
uav_match=dji_mavic3pro:name="DJI",model="Mavic 3 Pro",ssid="^DJI[-_]Mavic[-_]?3[-_]?Pro.*"
uav_match=dji_mini3:name="DJI",model="Mini 3",ssid="^DJI[-_]Mini[-_]?3([-_].*)?$"
uav_match=dji_mini3pro_explicit:name="DJI",model="Mini 3 Pro",ssid="^DJI[-_]Mini[-_]?3[-_]?Pro.*"
uav_match=dji_mini4pro:name="DJI",model="Mini 4 Pro",ssid="^DJI[-_]Mini[-_]?4[-_]?Pro.*"
uav_match=dji_mini4:name="DJI",model="Mini 4",ssid="^DJI[-_]Mini[-_]?4([-_].*)?$"
uav_match=dji_air2s:name="DJI",model="Air 2S",ssid="^DJI[-_]Air[-_]?2S.*"
uav_match=dji_air3:name="DJI",model="Air 3",ssid="^DJI[-_]Air[-_]?3([-_].*)?$"
uav_match=dji_air3s:name="DJI",model="Air 3S",ssid="^DJI[-_]Air[-_]?3S.*"
uav_match=dji_avata:name="DJI",model="Avata FPV",ssid="^DJI[-_]?Avata.*"
uav_match=dji_avata2:name="DJI",model="Avata 2 FPV",ssid="^DJI[-_]?Avata[-_]?2.*"
uav_match=dji_inspire2:name="DJI",model="Inspire 2",ssid="^Inspire[-_]2.*"
uav_match=dji_inspire3:name="DJI",model="Inspire 3 (cinematography)",ssid="^Inspire[-_]3.*"
uav_match=dji_phantom4_rtk:name="DJI",model="Phantom 4 RTK (survey/police)",ssid="^P4[-_]RTK.*|^PhantomRTK.*"
uav_match=dji_neo:name="DJI",model="Neo",ssid="^DJI[-_]?Neo.*"
uav_match=dji_flip:name="DJI",model="Flip",ssid="^DJI[-_]?Flip.*"

# Generic DJI catch-all — anything starting "DJI-" we haven't matched yet
uav_match=dji_generic:name="DJI",model="DJI (unmatched model)",ssid="^DJI[-_].*"

# Autel — enterprise/police segment
uav_match=autel_evo_max:name="Autel",model="EVO Max 4T (enterprise)",ssid="^MAX_EVO.*|^EVO[-_]Max.*"
uav_match=autel_evo_ii:name="Autel",model="EVO II Pro (enterprise/photography)",ssid="^EVO[-_]?II.*"
uav_match=autel_dragonfish:name="Autel",model="Dragonfish (enterprise/police VTOL)",ssid="^Dragonfish.*"

# Skydio (enterprise — gov/police, US-built)
uav_match=skydio_x10:name="Skydio",model="X10 (enterprise/police)",ssid="^Skydio[-_]?X10.*"
uav_match=skydio_x2:name="Skydio",model="X2 (enterprise/police, retired)",ssid="^Skydio[-_]?X2.*"
uav_match=skydio_2plus:name="Skydio",model="2+",ssid="^Skydio[-_]?2.*"

# Yuneec (some UK police use H520E)
uav_match=yuneec_h520:name="Yuneec",model="H520 / H520E (police/inspection)",ssid="^H520.*"
uav_match=yuneec_typhoon:name="Yuneec",model="Typhoon H",ssid="^Typhoon.*"

# UK delivery drone trial fleets (predictive — not many in the wild yet)
uav_match=wing_delivery:name="Wing (Alphabet)",model="Delivery drone",ssid="^WING[-_].*"
uav_match=manna_delivery:name="Manna",model="Delivery drone",ssid="^Manna[-_].*"
uav_match=skyports_nhs:name="Skyports",model="NHS medical drone",ssid="^Skyports[-_].*|^SP[-_]NHS.*"
uav_match=apian_nhs:name="Apian",model="NHS medical drone",ssid="^Apian[-_].*"
uav_match=zipline:name="Zipline",model="Zip / P2",ssid="^Zipline[-_].*"

# FPV / hobby controllers (less interesting but useful to filter out from "unknown")
uav_match=fpv_betaflight:name="FPV (Betaflight/iNav)",model="DIY FPV drone",ssid="^Betaflight[-_].*|^iNav[-_].*|^BTFL[-_].*"
